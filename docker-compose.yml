services:
  mysql:
    image: mysql:8.1.0
    container_name: mysql8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: adminvc680920
      MYSQL_DATABASE: study
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  nacos:
    image: nacos/nacos-server:v1.4.6
    container_name: nacos
    ports:
      - "8848:8848"
    environment:
      MODE: standalone
    networks:
      - app-network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8848/nacos" ]
      interval: 5s
      timeout: 5s
      retries: 20

  # 6 个独立 Redis 节点（你原来想要的）
  redis1:
    image: redis:6.2
    container_name: redis1
    ports:
      - "6379:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --appendonly yes --protected-mode no --bind 0.0.0.0
    volumes:
      - redis1-data:/data
    networks:
      - app-network
    restart: always

  redis2:
    image: redis:6.2
    container_name: redis2
    ports:
      - "6380:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --appendonly yes --protected-mode no --bind 0.0.0.0
    volumes:
      - redis2-data:/data
    networks:
      - app-network
    restart: always

  redis3:
    image: redis:6.2
    container_name: redis3
    ports:
      - "6381:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --appendonly yes --protected-mode no --bind 0.0.0.0
    volumes:
      - redis3-data:/data
    networks:
      - app-network
    restart: always

  redis4:
    image: redis:6.2
    container_name: redis4
    ports:
      - "6382:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --appendonly yes --protected-mode no --bind 0.0.0.0
    volumes:
      - redis4-data:/data
    networks:
      - app-network
    restart: always

  redis5:
    image: redis:6.2
    container_name: redis5
    ports:
      - "6383:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --appendonly yes --protected-mode no --bind 0.0.0.0
    volumes:
      - redis5-data:/data
    networks:
      - app-network
    restart: always

  redis6:
    image: redis:6.2
    container_name: redis6
    ports:
      - "6384:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --appendonly yes --protected-mode no --bind 0.0.0.0
    volumes:
      - redis6-data:/data
    networks:
      - app-network
    restart: always

