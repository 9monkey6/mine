server:
  port: 5000
  tomcat:
    uri-encoding: UTF-8
    keep-alive-timeout: 0 # 防止 Tomcat 缓冲 SSE 响应
token:
  expiration-time: 2592000000 #token失效时间一个月 1000 * 60 * 60 * 24 * 30
  secret: shepherd #token秘钥
app:
  appId: org.mine.learn
  appName: 我的自研
spring:
  mvc:
    async:
      request-timeout: 0 # 禁用 SSE 缓冲，确保流式传输

#  http:
#    encoding:
#      charset: UTF-8
#      force: true
#      enabled: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    database: 0
    password:
    timeout: 30000
    cluster:
      nodes:
        - ${REDIS_HOST:localhost}:6379
        - ${REDIS_HOST:localhost}:6380
        - ${REDIS_HOST:localhost}:6381
        - ${REDIS_HOST:localhost}:6382
        - ${REDIS_HOST:localhost}:6383
        - ${REDIS_HOST:localhost}:6384
    jedis:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0
  application:
    name: mine-learn
  datasource:
    druid:
      url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}/study?serverTimezone=GMT%2b8
      username: root
      password: adminvc680920
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 10000
      test-on-borrow: true
      test-on-return: false
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:localhost}:8848
      config:
        server-addr: ${NACOS_HOST:localhost}:8848
mybatis:
  mapper-locations: classpath:mapper/*Mapper.xml
  type-aliases-package: org.mine.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
logging:
  level:
    org.springframework.security: DEBUG
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html # 新版路径
    disable-swagger-default-url: true
    operations-sorter: alpha
    tags-sorter: alpha
    urls:
      - url: /v3/api-docs
        name: Mine Learn API
  api-docs:
    path: /v3/api-docs