name: 项目CI/CD自动化构建流水线

on:
  push:
    branches:
      - master  # 代码推送到master时自动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Maven打包Jar
        run: mvn clean package -Dmaven.test.skip=true

      - name: 构建Docker镜像
        run: docker build -t mine-gateway:latest .

      - name: 构建完成通知
        run: echo "✅ CI/CD 自动化构建成功！Jar打包+镜像构建完成"