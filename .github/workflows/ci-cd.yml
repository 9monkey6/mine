name: CI/CD自动化构建流水线

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 关键修复：只打包 gateway 模块
      - name: Maven 打包 gateway
        run: mvn -pl gateway clean package -Dmaven.test.skip=true

      # 关键修复：进入 gateway 目录再构建镜像
      - name: 构建 Docker 镜像
        run: |
          cd gateway
          docker build -t mine-gateway:latest .
          echo "✅ 镜像构建成功！"